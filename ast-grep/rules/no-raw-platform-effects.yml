id: no-raw-platform-effects
language: TypeScript
severity: error
message: Use Effect Clock, Random, Config, HTTP, and scheduling services instead of raw platform globals.
rule:
  any:
    - pattern: Date.now()
    - pattern: new Date($$$ARGS)
    - pattern: Math.random()
    - pattern: fetch($$$ARGS)
    - pattern: setTimeout($$$ARGS)
    - pattern: setInterval($$$ARGS)
    - pattern: process.env
    - pattern: process.env.$NAME
    - pattern: process.env[$NAME]
files:
  - "apps/**/src/**/*.ts"
  - "packages/**/src/**/*.ts"
ignores:
  - "apps/rika/src/main.ts"
  - "packages/extensions/src/mcp-oauth.ts"
  - "packages/tui/src/adapter.ts"
