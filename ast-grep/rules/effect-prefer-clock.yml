id: effect-prefer-clock
language: TypeScript
severity: info
message: Effect TS advisory — prefer Clock.currentTimeMillis/currentTimeNanos for time and DateTime for date values so time stays injectable and testable.
rule:
  any:
    - pattern: Date.now()
    - pattern: new Date($$$ARGS)
    - pattern: performance.now()
files:
  - "**/*.ts"
  - "**/*.tsx"
ignores:
  - "**/dist/**"
  - "**/coverage/**"
  - "**/generated/**"
  - "node_modules/**"
  - "repos/**"
