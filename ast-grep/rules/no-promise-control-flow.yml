id: no-promise-control-flow
language: TypeScript
severity: error
message: Model asynchronous work as Effect; bridge Promise or callback APIs only inside an explicit adapter.
rule:
  any:
    - pattern: async function $NAME($$$ARGS) { $$$BODY }
    - pattern: async function* $NAME($$$ARGS) { $$$BODY }
    - pattern: async ($$$ARGS) => $BODY
    - pattern: async $ARG => $BODY
    - pattern: new Promise($$$ARGS)
    - pattern: Promise.all($$$ARGS)
    - pattern: Promise.allSettled($$$ARGS)
    - pattern: Promise.race($$$ARGS)
    - pattern: $VALUE.then($$$ARGS)
    - pattern: $VALUE.catch($$$ARGS)
constraints:
  VALUE:
    not:
      regex: "^Effect$"
files:
  - "apps/**/src/**/*.ts"
  - "packages/**/src/**/*.ts"
ignores:
  - "apps/rika/src/command.ts"
  - "apps/rika/src/main.ts"
  - "packages/extensions/src/mcp-oauth.ts"
  - "packages/tui/src/adapter.ts"
