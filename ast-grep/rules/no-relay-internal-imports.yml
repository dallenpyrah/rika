id: no-relay-internal-imports
language: TypeScript
severity: error
message: Rika consumes Relay through @relayfx/sdk public exports only.
rule:
  kind: string_fragment
  regex: "^@relayfx/(runtime|schema|store-sql|http|cli|observability|ai|mcp|ui|test|evals|blobs)($|/)"
files:
  - "**/*.ts"
  - "**/*.tsx"
ignores:
  - "**/dist/**"
  - "node_modules/**"
