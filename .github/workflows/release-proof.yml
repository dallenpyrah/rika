name: release-proof

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  artifact:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: blacksmith-6vcpu-macos-15, target: darwin-arm64 }
          - { runner: blacksmith-6vcpu-macos-15, target: darwin-x64 }
          - { runner: blacksmith-4vcpu-ubuntu-2404-arm, target: linux-arm64 }
          - { runner: blacksmith-4vcpu-ubuntu-2404, target: linux-x64 }
    runs-on: ${{ matrix.runner }}
    env:
      ENV: /dev/null
      BASH_ENV: /dev/null
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.14 }
      - run: bun install --frozen-lockfile
      - name: Make Effect TypeScript binary executable
        if: runner.os == 'Linux'
        run: find node_modules/.bun -path '*/@effect/tsgo-linux-*/lib/tsc' -exec chmod +x {} +
      - name: Prepare login shells for tool runs
        if: runner.os == 'Linux'
        run: echo "export PATH=$HOME/.bun/bin:\$PATH" | sudo tee /etc/profile.d/zz-bun.sh >/dev/null
      - run: bun run check
      - run: bun run package -- --target ${{ matrix.target }}
      - run: bun run release-smoke -- --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v7
        with:
          name: rika-${{ matrix.target }}
          path: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS
            artifacts/release-evidence.json
          if-no-files-found: error
