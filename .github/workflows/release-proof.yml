name: release-proof

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  artifact:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-14, target: darwin-arm64 }
          - { runner: macos-13, target: darwin-x64 }
          - { runner: ubuntu-24.04-arm, target: linux-arm64 }
          - { runner: ubuntu-24.04, target: linux-x64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.14 }
      - run: bun install --frozen-lockfile
      - run: bun run package:construct:test
      - run: bun run scripts/package.ts --target ${{ matrix.target }}
      - run: bun run scripts/package-smoke.ts
      - uses: actions/upload-artifact@v4
        with:
          name: rika-${{ matrix.target }}
          path: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS
            artifacts/release-evidence.json
          if-no-files-found: error
