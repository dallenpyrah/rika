name: publish

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: package-${{ matrix.target }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: blacksmith-6vcpu-macos-15
            target: darwin-arm64
            kernel: Darwin
            architecture: arm64
          - runner: macos-15-intel
            target: darwin-x64
            kernel: Darwin
            architecture: x86_64
          - runner: blacksmith-4vcpu-ubuntu-2404-arm
            target: linux-arm64
            kernel: Linux
            architecture: aarch64
          - runner: blacksmith-4vcpu-ubuntu-2404
            target: linux-x64
            kernel: Linux
            architecture: x86_64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    env:
      ENV: /dev/null
      BASH_ENV: /dev/null
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Prepare Linux login shells
        if: runner.os == 'Linux'
        run: |
          sudo rm -f /etc/profile.d/blacksmith.sh
          echo "export PATH=$HOME/.bun/bin:\$PATH" | sudo tee /etc/profile.d/zz-bun.sh >/dev/null
      - name: Verify native runner
        env:
          EXPECTED_KERNEL: ${{ matrix.kernel }}
          EXPECTED_ARCHITECTURE: ${{ matrix.architecture }}
        run: |
          test "$(uname -s)" = "$EXPECTED_KERNEL"
          test "$(uname -m)" = "$EXPECTED_ARCHITECTURE"
          if [ "$EXPECTED_KERNEL" = Darwin ]; then
            test "$(sysctl -in sysctl.proc_translated 2>/dev/null || echo 0)" = 0
          fi
      - name: Package
        id: package
        env:
          TARGET: ${{ matrix.target }}
        run: |
          bun run package -- --target "$TARGET"
          archive="$(find artifacts -maxdepth 1 -type f -name "rika-*-$TARGET.tar.gz" -print -quit)"
          test -n "$archive"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
      - name: Verify executable architecture
        env:
          ARCHIVE: ${{ steps.package.outputs.archive }}
          EXPECTED_ARCHITECTURE: ${{ matrix.architecture }}
        run: |
          directory="$(mktemp -d)"
          tar -xzf "$ARCHIVE" -C "$directory"
          file "$directory"/rika-*/bin/rika "$directory"/rika-*/bin/.rika-runtime
          for executable in "$directory"/rika-*/bin/rika "$directory"/rika-*/bin/.rika-runtime; do
            case "$EXPECTED_ARCHITECTURE" in
              x86_64) file "$executable" | grep -Eq 'x86[-_ ]64|x86_64' ;;
              arm64|aarch64) file "$executable" | grep -Eq 'arm64|aarch64|ARM aarch64' ;;
            esac
          done
      - name: Smoke extracted release
        env:
          TARGET: ${{ matrix.target }}
        run: bun run release-smoke -- --target "$TARGET"
      - name: Attest archive
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: ${{ steps.package.outputs.archive }}
      - name: Upload archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rika-${{ matrix.target }}
          path: ${{ steps.package.outputs.archive }}
          compression-level: 0
          if-no-files-found: error

  aggregate:
    name: aggregate-release
    needs: package
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Download archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: rika-*
          path: artifacts
          merge-multiple: true
      - name: Validate release identity
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version="$(bun -e 'console.log((await Bun.file("apps/rika/package.json").json()).version)')"
          test "$GITHUB_REF_NAME" = "v$version"
      - name: Aggregate release metadata
        run: bun run package -- --aggregate
      - name: Verify producer attestations
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for archive in artifacts/*.tar.gz; do
            gh attestation verify "$archive" --repo "$GITHUB_REPOSITORY"
          done
      - name: Attest release metadata
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: |-
            artifacts/SHA256SUMS
            artifacts/release-evidence.json
      - name: Upload release metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-metadata
          path: |-
            artifacts/SHA256SUMS
            artifacts/release-evidence.json
          if-no-files-found: error

  publish:
    name: publish-release
    if: startsWith(github.ref, 'refs/tags/')
    needs: aggregate
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: rika-*
          path: artifacts
          merge-multiple: true
      - name: Download release metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-metadata
          path: artifacts
      - name: Verify checksums
        working-directory: artifacts
        run: sha256sum --check SHA256SUMS
      - name: Create and publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test "$(find artifacts -maxdepth 1 -type f | wc -l)" -eq 6
          gh release create "$GITHUB_REF_NAME" artifacts/* --draft --generate-notes --verify-tag
          test "$(gh release view "$GITHUB_REF_NAME" --json assets --jq '.assets | length')" -eq 6
          gh release edit "$GITHUB_REF_NAME" --draft=false
