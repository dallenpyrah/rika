name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    env:
      ENV: /dev/null
      BASH_ENV: /dev/null
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Cache Bun downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-${{ runner.arch }}-bun-v1-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-bun-v1-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Make Effect TypeScript binary executable
        run: find node_modules/.bun -path '*/@effect/tsgo-linux-*/lib/tsc' -exec chmod +x {} +
      - name: Prepare login shells for tool runs
        run: |
          sudo rm -f /etc/profile.d/blacksmith.sh
          echo "export PATH=$HOME/.bun/bin:\$PATH" | sudo tee /etc/profile.d/zz-bun.sh >/dev/null
      - name: Guard login shell behavior
        run: |
          cd /tmp
          [ "$(sh -lc pwd)" = "/tmp" ] || { echo "login shells change directory; fix the runner image prep"; exit 1; }
          noise="$(sh -lc true 2>&1)"
          [ -z "$noise" ] || { echo "login shells emit profile noise: $noise"; exit 1; }
      - name: Check
        run: bun run check

  tui:
    name: tui
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 20
    env:
      ENV: /dev/null
      BASH_ENV: /dev/null
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Cache Bun downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-${{ runner.arch }}-bun-v1-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-bun-v1-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Make Effect TypeScript binary executable
        run: find node_modules/.bun -path '*/@effect/tsgo-linux-*/lib/tsc' -exec chmod +x {} +
      - name: Prepare login shells for tool runs
        run: |
          sudo rm -f /etc/profile.d/blacksmith.sh
          echo "export PATH=$HOME/.bun/bin:\$PATH" | sudo tee /etc/profile.d/zz-bun.sh >/dev/null
      - name: Guard login shell behavior
        run: |
          cd /tmp
          [ "$(sh -lc pwd)" = "/tmp" ] || { echo "login shells change directory; fix the runner image prep"; exit 1; }
          noise="$(sh -lc true 2>&1)"
          [ -z "$noise" ] || { echo "login shells emit profile noise: $noise"; exit 1; }
      - name: TUI app tests
        run: bun run test-tui

  proc:
    name: proc
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 20
    env:
      ENV: /dev/null
      BASH_ENV: /dev/null
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Cache Bun downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-${{ runner.arch }}-bun-v1-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-bun-v1-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Make Effect TypeScript binary executable
        run: find node_modules/.bun -path '*/@effect/tsgo-linux-*/lib/tsc' -exec chmod +x {} +
      - name: Prepare login shells for tool runs
        run: |
          sudo rm -f /etc/profile.d/blacksmith.sh
          echo "export PATH=$HOME/.bun/bin:\$PATH" | sudo tee /etc/profile.d/zz-bun.sh >/dev/null
      - name: Guard login shell behavior
        run: |
          cd /tmp
          [ "$(sh -lc pwd)" = "/tmp" ] || { echo "login shells change directory; fix the runner image prep"; exit 1; }
          noise="$(sh -lc true 2>&1)"
          [ -z "$noise" ] || { echo "login shells emit profile noise: $noise"; exit 1; }
      - name: Process lifecycle tests
        run: bun run test-proc

  check:
    name: check
    if: ${{ always() }}
    needs: [quality, tui, proc]
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - name: Require every CI lane
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          TUI_RESULT: ${{ needs.tui.result }}
          PROC_RESULT: ${{ needs.proc.result }}
        run: |
          test "$QUALITY_RESULT" = success
          test "$TUI_RESULT" = success
          test "$PROC_RESULT" = success
